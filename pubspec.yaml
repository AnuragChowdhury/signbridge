name: signbridge
description: AI-powered real-time multilingual sign language keyboard. Detects hand gestures via front camera, recognizes sign language using on-device TFLite models, and converts to editable text. Fully offline.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Camera
  camera: ^0.11.0+2

  # ML / Computer Vision
  tflite_flutter: ^0.12.1

  # Local Storage
  hive_ce: ^2.8.0
  hive_ce_flutter: ^2.2.0

  # UI
  google_fonts: ^6.2.1

  # Utilities
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  share_plus: ^10.1.4
  logger: ^2.4.0
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_ce_generator: ^1.7.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/models/asl/
    - assets/models/bsl/
    - assets/models/ipsl/
    - assets/models/csl/

